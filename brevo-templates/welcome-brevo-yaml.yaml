                      text-valign: top
                      valign: top
                      width: 100%
                  content: '<p style="color:#374151;font-size:16px;line-height:1.8;">We know the job search can feel like shouting into the void. Hundreds of applications. Silence. Rejection emails that don''t even use your name. It''s exhausting, and it''s okay to feel that way.</p><p style="color:#374151;font-size:16px;line-height:1.8;">But here''s something most people don''t realize: <strong style="color:#1f2937;">75% of resumes are rejected by automated systems before a human ever sees them.</strong> It''s not that you''re not qualified. It''s that your resume isn''t speaking the language these systems understand.</p><p style="color:#374151;font-size:16px;line-height:1.8;">That changes today. You just took the single most important step toward landing the job you deserve. ResumeATS was built by people who''ve been exactly where you are right now — and we built the tool we wish we''d had.</p>'
