                  content: '<p style="color:#4f46e5;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:16px;">WHAT YOU CAN DO RIGHT NOW:</p><p style="color:#374151;font-size:15px;line-height:1.8;margin-bottom:12px;"><strong style="color:#4f46e5;">1.</strong> <strong style="color:#1f2937;">Build your first resume</strong> — Pick a professional, ATS-optimized template and fill in your details. It takes less than 15 minutes.</p><p style="color:#374151;font-size:15px;line-height:1.8;margin-bottom:12px;"><strong style="color:#4f46e5;">2.</strong> <strong style="color:#1f2937;">Run the ATS checker</strong> — See exactly how your resume scores against real applicant tracking systems and get specific fixes.</p><p style="color:#374151;font-size:15px;line-height:1.8;"><strong style="color:#4f46e5;">3.</strong> <strong style="color:#1f2937;">Use AI to sharpen your bullet points</strong> — Our AI rewrites weak descriptions into achievement-driven statements that recruiters love.</p>'
